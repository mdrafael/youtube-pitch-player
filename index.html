<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Pitch Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="logo">
          <span class="logo-icon" aria-hidden="true">♪</span>
          <h1>YouTube Pitch Player</h1>
        </div>
        <p class="subtitle">Extraia o áudio e ajuste o tom em tempo real</p>
      </header>

      <main class="main">
        <section class="input-section" aria-label="Fonte de áudio">
          <div class="tabs" role="tablist">
            <button type="button" id="tab-yt" class="tab active" role="tab" aria-selected="true">
              YouTube
            </button>
            <button type="button" id="tab-file" class="tab" role="tab" aria-selected="false">
              Arquivo MP3
            </button>
          </div>

          <div id="panel-yt" class="tab-panel">
            <form id="yt-form" class="url-form">
              <label for="video-url" class="sr-only">URL do YouTube</label>
              <div class="url-input-wrap">
                <input
                  type="url"
                  id="video-url"
                  placeholder="Cole o link do YouTube..."
                  autocomplete="off"
                  required
                />
                <button type="submit" id="extract-btn" class="btn btn-primary">
                  <span class="btn-text">Extrair áudio</span>
                  <span class="btn-spinner" hidden aria-hidden="true"></span>
                </button>
              </div>
            </form>
          </div>

          <div id="panel-file" class="tab-panel" hidden>
            <form id="file-form" class="file-form">
              <label for="audio-file" class="file-label">
                <span class="file-label-text">Escolher MP3 ou outro áudio</span>
                <input type="file" id="audio-file" accept="audio/*,.mp3,.m4a,.wav,.ogg,.aac,.flac" />
              </label>
              <p class="file-hint">Funciona offline — ideal quando o YouTube bloqueia a extração.</p>
            </form>
          </div>

          <progress id="progress-bar" class="progress-bar" max="100" value="0" hidden></progress>
          <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
        </section>

        <section id="player-section" class="player-section" hidden>
          <div class="transport">
            <button type="button" id="play-btn" class="btn btn-primary play-btn" disabled>▶ Tocar</button>
            <input
              type="range"
              id="seek-slider"
              class="seek-slider"
              min="0"
              max="1000"
              value="0"
              aria-label="Posição"
              disabled
            />
            <span id="time-display" class="time-display">0:00 / 0:00</span>
          </div>

          <div class="pitch-panel">
            <div class="pitch-header">
              <h2>Tom (pitch)</h2>
              <span id="pitch-value" class="pitch-value">0 semitons</span>
            </div>
            <div class="pitch-controls">
              <span class="pitch-label" aria-hidden="true">−</span>
              <input
                type="range"
                id="pitch-slider"
                class="pitch-slider"
                min="-12"
                max="12"
                step="0.5"
                value="0"
                aria-label="Tom em semitons"
                disabled
              />
              <span class="pitch-label" aria-hidden="true">+</span>
            </div>
            <div class="pitch-actions">
              <button type="button" id="reset-pitch-btn" class="btn btn-secondary" disabled>
                Resetar tom
              </button>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>Extrai áudio · Web Audio · SoundTouch · Windows, Android e iOS</p>
      </footer>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
