services:
  - type: web
    name: youtube-pitch-player
    runtime: node
    plan: free
    buildCommand: npm install && bash scripts/install-deno.sh
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ALLOWED_ORIGINS
        value: https://youtube-pitch-player.vercel.app,http://localhost:5173
